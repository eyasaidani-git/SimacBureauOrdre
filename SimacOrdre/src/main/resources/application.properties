spring.application.name=SimacOrdre

server.port=8081


spring.datasource.url=jdbc:postgresql://localhost:5432/bureau_ordre
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

springdoc.swagger-ui.path=/swagger-ui.html

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=${MAIL_USERNAME}

app.recaptcha.enabled=false
app.recaptcha.secret=${RECAPTCHA_SECRET:}
app.recaptcha.minimum-score=0.5

app.gmail.import.enabled=true
app.gmail.import.fixed-delay-ms=300000
app.gmail.import.initial-delay-ms=30000

app.gmail.imap.host=imap.gmail.com
app.gmail.imap.port=993
app.gmail.imap.username=${MAIL_USERNAME}
app.gmail.imap.password=${MAIL_PASSWORD}

app.gmail.import.mark-as-read=false
app.gmail.import.preview-limit=10

app.gmail.import.createur-email=adminsimac@gmail.com
app.gmail.import.destination=SIMAC
app.gmail.import.date-limite-days=7